name: "SmartGridOptimizer"
version: "1.0.0"
author: "Agent"
description: "A Smart Grid environment where an agent controls a battery backup network. Maximize profit and grid stability by charging during low-demand/high-generation periods and discharging during peak demand."

environment:
  type: "http"
  spec_version: "1.0"
  endpoints:
    reset: "/reset"
    step: "/step"
    state: "/state"
    tasks: "/tasks"
    grader: "/grader"
    baseline: "/baseline"

docker:
  build_command: "docker build -t smart-grid-env ."
  run_command: "docker run -p 7860:7860 smart-grid-env"

tasks:
  - id: "task_1"
    name: "task_1"
    task_id: "task_1"
    difficulty: "easy"
    description: "Charge the battery with at least 15 MWh combined during the first 12 hours (cheap generation)."
    grader: "/grader"
    evaluator: "/grader"
    has_grader: true
  - id: "task_2"
    name: "task_2"
    task_id: "task_2"
    difficulty: "medium"
    description: "Have at least 10 MWh of charge ready right before the peak hours start (hour 17)."
    grader: "/grader"
    evaluator: "/grader"
    has_grader: true
  - id: "task_3"
    name: "task_3"
    task_id: "task_3"
    difficulty: "hard"
    description: "Survive the full 24-hour cycle and finish with a total_profit strictly greater than exactly $0.00."
    grader: "/grader"
    evaluator: "/grader"
    has_grader: true
